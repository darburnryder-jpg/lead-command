<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Keystone — Lead Command (Migration)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
:root {
  --bg: #04060A; --bg2: #070B12; --panel: #0A1019; --panel2: #0D1521;
  --line: #15202E; --line2: #1C2A3C;
  --blue: #2BB8FF; --blue-bright: #4FCBFF;
  --blue-glow: rgba(43,184,255,0.5); --blue-soft: rgba(43,184,255,0.12);
  --text: #E6F0FA; --text-soft: #7F93A8; --text-mute: #4A5A6E;
  --hot: #FF4D6D; --warm: #FFB23E; --cold-c: #4A6B8A;
  --won: #2BFF9E; --lost: #54657A;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; min-height:100vh; padding-bottom:100px; -webkit-font-smoothing:antialiased; }
body::before { content:""; position:fixed; top:-30%; left:50%; transform:translateX(-50%); width:900px; height:600px; background:radial-gradient(ellipse at center, var(--blue-glow), transparent 70%); opacity:0.12; filter:blur(60px); z-index:0; pointer-events:none; }
.app { max-width:920px; margin:0 auto; padding:0 16px; position:relative; z-index:2; }

header { padding:24px 0 16px; display:flex; align-items:center; gap:12px; }
.logo-dot { width:12px; height:12px; border-radius:50%; background:var(--blue); box-shadow:0 0 12px var(--blue); animation:pulse 2.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
.brand h1 { font-size:1.15rem; font-weight:700; }
.brand h1 span { color:var(--blue); }
.brand .sub { font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:var(--text-mute); letter-spacing:0.15em; text-transform:uppercase; }

.migrate-box {
  background: linear-gradient(135deg, var(--panel), var(--panel2));
  border: 2px solid var(--blue);
  border-radius: 20px;
  padding: 28px 24px;
  margin: 20px 0 24px;
  box-shadow: 0 0 40px rgba(43,184,255,0.2);
}
.migrate-box h2 { font-size: 1.3rem; margin-bottom: 8px; color: var(--blue-bright); }
.migrate-box p { font-size: 0.88rem; color: var(--text-soft); margin-bottom: 18px; line-height: 1.5; }
.migrate-status { font-family:'JetBrains Mono',monospace; font-size:0.85rem; color:var(--warm); margin-bottom:16px; min-height:22px; }
.migrate-status.done { color: var(--won); }
.migrate-status.error { color: var(--hot); }
.migrate-btn {
  width: 100%;
  background: var(--blue);
  color: var(--bg);
  border: none;
  padding: 16px;
  border-radius: 12px;
  font-family: inherit;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  letter-spacing: 0.02em;
  box-shadow: 0 4px 20px var(--blue-glow);
  transition: all 0.2s;
}
.migrate-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 30px var(--blue-glow); }
.migrate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.lead-count {
  background: var(--panel);
  border: 1px solid var(--line2);
  border-radius: 12px;
  padding: 14px 16px;
  text-align: center;
  margin-bottom: 16px;
}
.lead-count .num { font-family:'JetBrains Mono',monospace; font-size:2.2rem; font-weight:700; color: var(--blue-bright); line-height:1; }
.lead-count .lab { font-size:0.7rem; color: var(--text-mute); letter-spacing:0.12em; text-transform:uppercase; margin-top:6px; font-weight:600; }

.sec-title { font-size:0.72rem; font-weight:700; color:var(--text-mute); letter-spacing:0.16em; text-transform:uppercase; margin:20px 0 12px; display:flex; align-items:center; gap:10px; }
.sec-title::after { content:""; flex:1; height:1px; background:var(--line); }
.sec-title .count { color:var(--blue); font-family:'JetBrains Mono',monospace; }

.lead { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; padding:14px 16px; display:flex; align-items:center; gap:12px; }
.warmth-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.warmth-dot.hot { background:var(--hot); }
.warmth-dot.warm { background:var(--warm); }
.warmth-dot.cold { background:var(--cold-c); }
.lead-main { flex:1; min-width:0; }
.lead-name { font-size:0.96rem; font-weight:600; }
.lead-biz { font-size:0.78rem; color:var(--text-soft); margin-top:2px; }
.lead-uploaded { color: var(--won); font-size: 0.7rem; font-family:'JetBrains Mono',monospace; }

.empty { text-align:center; padding:60px 20px; color:var(--text-mute); }
.empty .ico { font-size:2.5rem; margin-bottom:16px; opacity:0.5; }
.empty h3 { color:var(--text-soft); font-weight:600; margin-bottom:8px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-dot"></div>
    <div class="brand">
      <h1>Lead<span>Command</span></h1>
      <div class="sub">Migration Tool</div>
    </div>
  </header>

  <div class="lead-count">
    <div class="num" id="leadCount">0</div>
    <div class="lab">Leads Found on This Device</div>
  </div>

  <div class="migrate-box">
    <h2>☁ Upload Your Leads to Cloud</h2>
    <p>This will copy every lead from this device into Supabase. Your local copy stays exactly where it is — nothing gets deleted. Just a one-way upload.</p>
    <div class="migrate-status" id="status">Ready to migrate.</div>
    <button class="migrate-btn" id="migrateBtn">Upload All Leads to Cloud →</button>
  </div>

  <div class="sec-title">Leads on this device <span class="count" id="leadCountSec">0</span></div>
  <div id="leadList"></div>
</div>

<script>
const SUPABASE_URL = 'https://vjmilasxxzrigophosdx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_j9T7zbiCAP2WM4YvamD6cg_s9p1TNzK';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let localLeads = [];
let uploaded = new Set();

function loadLocal() {
  try {
    const raw = localStorage.getItem('leads_data');
    if (raw) localLeads = JSON.parse(raw);
  } catch(e) { localLeads = []; }
}

function todayStr() { return new Date().toISOString().split('T')[0]; }

function render() {
  document.getElementById('leadCount').textContent = localLeads.length;
  document.getElementById('leadCountSec').textContent = localLeads.length;
  const list = document.getElementById('leadList');
  if (localLeads.length === 0) {
    list.innerHTML = `<div class="empty"><div class="ico">⚠</div><h3>No leads found on this device</h3><p>Make sure you opened this from the home-screen app icon that has your leads.</p></div>`;
    document.getElementById('migrateBtn').disabled = true;
    return;
  }
  list.innerHTML = localLeads.map(l => `
    <div class="lead">
      <div class="warmth-dot ${l.warmth||'cold'}"></div>
      <div class="lead-main">
        <div class="lead-name">${l.name || 'Unnamed'}</div>
        <div class="lead-biz">${l.biz || ''}${l.niche?' · '+l.niche:''}</div>
      </div>
      ${uploaded.has(l.id) ? '<div class="lead-uploaded">✓ UPLOADED</div>' : ''}
    </div>`).join('');
}

async function migrate() {
  const btn = document.getElementById('migrateBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.className = 'migrate-status';
  status.textContent = 'Starting upload...';

  let success = 0;
  let failed = 0;

  for (let i = 0; i < localLeads.length; i++) {
    const l = localLeads[i];
    status.textContent = `Uploading ${i+1} of ${localLeads.length} — ${l.name}...`;
    try {
      const row = {
        id: l.id,
        name: l.name || '',
        biz: l.biz || '',
        niche: l.niche || '',
        source: l.source || 'Door Knock',
        phone: l.phone || '',
        value: l.value || '',
        stage: l.stage || 'Contacted',
        warmth: l.warmth || 'warm',
        notes: l.notes || '',
        next_action: l.nextAction || '',
        next_date: l.nextDate || null,
        last_contact: l.lastContact || null,
        checklist: l.checklist || [],
        updated_at: new Date().toISOString()
      };
      const { error } = await db.from('leads').upsert(row);
      if (error) {
        console.error('Failed:', l.name, error);
        failed++;
      } else {
        success++;
        uploaded.add(l.id);
      }
      render();
    } catch (e) {
      console.error('Error:', e);
      failed++;
    }
  }

  // Also upload todos if they exist
  try {
    const rawTodos = localStorage.getItem('todos_data');
    if (rawTodos) {
      const todos = JSON.parse(rawTodos);
      for (const t of todos) {
        await db.from('todos').upsert({
          id: t.id || 'T'+Date.now()+Math.floor(Math.random()*1000),
          text: t.text || '',
          done: !!t.done,
          created: t.created || todayStr()
        });
      }
    }
  } catch (e) { console.error('Todos error:', e); }

  if (failed === 0) {
    status.className = 'migrate-status done';
    status.textContent = `✓ DONE — All ${success} leads uploaded to cloud successfully.`;
    btn.textContent = 'Migration Complete ✓';
  } else {
    status.className = 'migrate-status error';
    status.textContent = `Uploaded ${success}, failed ${failed}. Check console for details.`;
    btn.disabled = false;
    btn.textContent = 'Try Failed Again';
  }
}

document.getElementById('migrateBtn').onclick = migrate;

loadLocal();
render();
</script>
</body>
</html>
